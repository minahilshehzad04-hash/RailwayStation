<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom CSS for additional styling */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .bg-img {
            background-image: url("/images/Train.jpeg");
            min-height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.5); /* Semi-transparent white overlay */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-form {
            width: 360px;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white background */
            border-radius: 10px;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
        }
        .login-form h2 {
            margin-bottom: 30px;
            text-align: center;
            color: #333; /* Darker text color */
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 20px; /* Increased padding for better input field appearance */
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 12px 20px; /* Increased padding for better button appearance */
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-login:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="bg-img">
        <div class="overlay">
            <div class="login-form">
                <h2>Login</h2>
                <form action="http://localhost:3001/login/staff" method="POST">
                    <div class="form-group">
                        <input type="text" name="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <!-- Use method-override to send the form as a POST request -->
                        <input type="hidden" name="_method" value="POST">
                        <button type="submit" class="btn btn-login">Login</button>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</body>
</html>
