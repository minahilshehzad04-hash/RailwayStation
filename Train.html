<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("/images/Train.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 1s ease-out, slideInUp 0.5s ease-out;
            opacity: 0;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 700;
            color: #2E3A59;
            letter-spacing: 1px;
            font-size: 28px;
            text-transform: uppercase;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #2E3A59;
            font-size: 16px;
            text-transform: uppercase;
            text-align: left;
            animation: slideInLeft 1s ease-out;
        }

        input[type=text], input[type=time], input[type=number] {
            width: calc(100% - 30px);
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-bottom: 2px solid #6a11cb;
            background: rgba(255, 255, 255, 0.8);
            transition: border-bottom-color 0.3s ease;
            font-size: 16px;
            outline: none;
            animation: slideInRight 1s ease-out;
        }

        input[type=text]:focus, input[type=time]:focus, input[type=number]:focus {
            border-bottom-color: #2575fc;
            background: rgba(255, 255, 255, 1);
        }

        .btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 15px 0;
            border: none;
            cursor: pointer;
            width: 100%;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            outline: none;
            animation: slideInUpBtn 1s ease-out;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(-50px);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInUpBtn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Train</h1>
        <form action="http://localhost:3001/submit/train" method="post">
            <label for="train_id">Train ID</label>
            <input type="text" id="train_id" placeholder="Enter Train ID" name="train_id" required>

            <label for="train_type">Train Type</label>
            <input type="text" id="train_type" placeholder="Enter Train Type" name="train_type" required>

            <label for="train_capacity">Capacity</label>
            <input type="number" id="train_capacity" placeholder="Enter Capacity" name="train_capacity" required>

            <label for="departure_time">Departure Time</label>
            <input type="time" id="departure_time" name="departure_time" required>

            <label for="arrival_time">Arrival Time</label>
            <input type="time" id="arrival_time" name="arrival_time" required>

            <label for="frequency">Frequency</label>
            <input type="number" id="frequency" placeholder="Enter Frequency" name="frequency" required>

            <label for="train_status">Status</label>
            <input type="text" id="train_status" placeholder="Enter Status" name="train_status" required>

            <label for="s_id">Station ID</label>
            <input type="text" id="s_id" placeholder="Enter Station ID" name="s_id" required>

            <button type="submit" class="btn">Submit</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.container').style.opacity = '1';
        });
    </script>
</body>
</html>
