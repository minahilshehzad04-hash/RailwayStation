<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("/images/Staff.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            text-align: left;
            animation: fadeIn 1s ease-out, slideInUp 0.5s ease-out;
            opacity: 0;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 700;
            color: #2E3A59;
            letter-spacing: 1px;
            font-size: 28px;
            text-transform: uppercase;
            text-align: center;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .form-group {
            width: 48%;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #2E3A59;
            font-size: 16px;
            text-transform: uppercase;
        }

        input[type=text], input[type=password], input[type=number] {
            width: calc(100% - 24px);
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-bottom: 2px solid #6a11cb;
            background: rgba(255, 255, 255, 0.8);
            transition: border-bottom-color 0.3s ease;
            font-size: 16px;
            outline: none;
        }

        input[type=text]:focus, input[type=password]:focus, input[type=number]:focus {
            border-bottom-color: #2575fc;
            background: rgba(255, 255, 255, 1);
        }

        .btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 15px 0;
            border: none;
            cursor: pointer;
            width: 100%;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(-50px);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInUpBtn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .form-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Staff</h1>
        <form action="http://localhost:3001/submit/staff" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="id">Staff ID</label>
                    <input type="text" id="id" placeholder="Enter ID" name="staff_id" required>
                </div>
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Enter First Name" name="staff_fname" required>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Enter Last Name" name="staff_lname" required>
                </div>
                <div class="form-group">
                    <label for="position">Position</label>
                    <input type="text" id="position" placeholder="Enter Position" name="staff_position" required>
                </div>
                <div class="form-group">
                    <label for="salary">Salary</label>
                    <input type="number" id="salary" placeholder="Enter Salary" name="staff_salary" required>
                </div>
                <div class="form-group">
                    <label for="station_id">Station ID</label>
                    <input type="text" id="station_id" placeholder="Enter Station ID" name="s_id" required>
                </div>
             <div class="form-group">
                    <label for="train_id">Train ID</label>
                    <input type="text" id="train_id" placeholder="Enter Train ID" name="train_id" required>
                </div>   
                <div class="form-group">
                    <label for="s_password">Password</label>
                    <input type="password" id="p_password" placeholder="Enter Password" name="s_password" required>
                </div>            <div class="form-group">
                    <label for="train_id">Email</label>
                    <input type="text" id="staff_email" placeholder="Enter Email" name="staff_email" required>
                </div>   


            </div>
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.container').style.opacity = '1';
        });
    </script>
</body>
</html>
